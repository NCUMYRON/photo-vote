<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>照片人氣投票</title>

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --red: #ef7376;
      --blue: #66b9d8;
      --green: #68b58d;
      --cream: #fff7e6;
      --paper: #fffdf7;
      --yellow: #ffd65a;
      --ink: #272727;
      --shadow: 5px 5px 0 var(--ink);
    }

    body {
      margin: 0;
      font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
      background: #242424;
      color: var(--ink);
    }

    button,
    input {
      font-family: inherit;
    }

    .page {
      width: min(1180px, calc(100% - 28px));
      margin: 18px auto 42px;
      background: var(--cream);
      border: 5px solid var(--ink);
      border-radius: 34px;
      overflow: hidden;
      box-shadow: 0 14px 0 rgba(0, 0, 0, 0.26);
    }

    /* =========================
       主視覺區
    ========================= */
    .hero {
      position: relative;
      padding: 34px 28px 130px;
      border-bottom: 5px solid var(--ink);
      background:
        repeating-linear-gradient(
          90deg,
          var(--red) 0 48px,
          #fff4ee 48px 54px,
          var(--blue) 54px 102px,
          #fff4ee 102px 108px,
          var(--green) 108px 156px,
          #fff4ee 156px 162px
        );
    }

    .side-badge {
      position: absolute;
      top: 22px;
      width: 72px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      z-index: 2;
    }

    .side-badge.left {
      left: 20px;
    }

    .side-badge.right {
      right: 20px;
    }

    .side-badge span {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 4px solid var(--ink);
      background: var(--paper);
      display: grid;
      place-items: center;
      font-size: 28px;
      font-weight: 1000;
      box-shadow: 3px 3px 0 var(--ink);
    }

    .hero-copy {
      max-width: 820px;
      margin: 0 auto;
      text-align: center;
    }

    .eyebrow {
      display: inline-block;
      padding: 8px 18px;
      border-radius: 999px;
      background: var(--ink);
      color: #fff;
      font-size: 18px;
      font-weight: 1000;
      letter-spacing: 1px;
      transform: rotate(-1deg);
      box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.25);
    }

    .hero h1 {
      margin: 16px 0 8px;
      color: #fff;
      font-size: clamp(48px, 8vw, 96px);
      line-height: 0.98;
      font-weight: 1000;
      letter-spacing: 2px;
      text-shadow:
        4px 4px 0 var(--ink),
        8px 8px 0 rgba(0, 0, 0, 0.18);
    }

    .hero h1 small {
      display: block;
      font-size: 0.48em;
      margin-bottom: 7px;
    }

    .hero-subtitle {
      display: inline-block;
      margin-top: 12px;
      padding: 11px 20px;
      background: var(--paper);
      border: 4px solid var(--ink);
      border-radius: 999px;
      font-size: 18px;
      font-weight: 1000;
      box-shadow: var(--shadow);
    }

    .intro-board {
      max-width: 940px;
      margin: 28px auto 0;
      padding: 20px;
      background: rgba(255, 253, 247, 0.96);
      border: 5px solid var(--ink);
      border-radius: 28px;
      box-shadow: 8px 8px 0 var(--ink);
      display: grid;
      grid-template-columns: 1.35fr 0.85fr;
      gap: 18px;
    }

    .intro-text,
    .intro-rule {
      border: 4px solid var(--ink);
      border-radius: 22px;
      padding: 20px;
      background: #fff;
    }

    .intro-text h2 {
      margin: 0 0 10px;
      font-size: 30px;
      line-height: 1.35;
      font-weight: 1000;
    }

    .intro-text p {
      margin: 0;
      font-size: 17px;
      line-height: 1.9;
      font-weight: 700;
    }

    .intro-rule {
      background: var(--green);
      color: #fff;
    }

    .intro-rule-title {
      display: inline-block;
      margin-bottom: 12px;
      padding: 6px 14px;
      border: 3px solid var(--ink);
      border-radius: 999px;
      background: var(--paper);
      color: var(--ink);
      font-size: 15px;
      font-weight: 1000;
    }

    .intro-rule ul {
      margin: 0;
      padding-left: 20px;
      font-size: 16px;
      line-height: 2;
      font-weight: 900;
    }

    /* =========================
       撐滿容器的組別切換按鈕
    ========================= */
    .hero-group-tabs {
      position: absolute;
      left: 50%;
      bottom: 26px;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 28px;
      z-index: 10;
      width: min(940px, calc(100% - 56px));
    }

    .group-btn {
      flex: 1;
      min-width: 0;
      height: 84px;
      border: 5px solid var(--ink);
      border-radius: 999px;
      background: var(--paper);
      color: var(--ink);
      font-size: 28px;
      font-weight: 1000;
      cursor: pointer;
      box-shadow: 7px 7px 0 var(--ink);
      transition:
        transform 0.18s ease,
        background 0.18s ease,
        color 0.18s ease;
    }

    .group-btn:hover {
      transform: translate(-3px, -3px);
    }

    .group-btn.active {
      background: var(--red);
      color: #fff;
    }

    /* =========================
       參賽作品標題
    ========================= */
    .works-area {
      padding: 30px 24px 0;
      background: var(--cream);
    }

    .works-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      flex-wrap: wrap;
      margin-bottom: 22px;
    }

    .works-title {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 36px;
      font-weight: 1000;
    }

    .works-title span {
      width: 52px;
      height: 52px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      border: 3px solid var(--ink);
      background: var(--yellow);
      box-shadow: 3px 3px 0 var(--ink);
    }

    /* =========================
       搜尋與排序
    ========================= */
    .toolbar {
      padding: 18px 24px 22px;
      border-bottom: 4px dashed var(--ink);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: center;
      background: var(--cream);
    }

    .search-box {
      position: relative;
      width: 100%;
      max-width: 560px;
    }

    .search-input {
      width: 100%;
      height: 58px;
      padding: 0 58px 0 20px;
      border: 4px solid var(--ink);
      border-radius: 999px;
      background: #fff;
      font-size: 16px;
      font-weight: 800;
      outline: none;
      box-shadow: 4px 4px 0 var(--ink);
    }

    .search-input:focus {
      background: #fffdf0;
    }

    .search-icon {
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 24px;
      font-weight: 1000;
      pointer-events: none;
    }

    .sort-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .sort-btn {
      border: 3px solid var(--ink);
      border-radius: 999px;
      background: #fff;
      padding: 12px 20px;
      font-size: 15px;
      font-weight: 1000;
      cursor: pointer;
      box-shadow: 3px 3px 0 var(--ink);
      transition: 0.18s ease;
    }

    .sort-btn:hover,
    .sort-btn.active {
      background: var(--yellow);
      transform: translate(-2px, -2px);
    }

    .result-bar {
      padding: 16px 24px 0;
      font-size: 15px;
      line-height: 1.7;
      font-weight: 900;
      color: #555;
      background: var(--cream);
    }

    .result-bar strong {
      color: var(--red);
      font-size: 18px;
    }

    /* =========================
       載入狀態
    ========================= */
    .loading-box {
      margin: 24px;
      padding: 42px 20px;
      border: 4px solid var(--ink);
      border-radius: 24px;
      background: #fff;
      text-align: center;
      font-size: 22px;
      font-weight: 1000;
      box-shadow: 6px 6px 0 var(--ink);
    }

    /* =========================
       作品卡片
    ========================= */
    .gallery {
      padding: 22px 24px 30px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 22px;
      background:
        radial-gradient(circle at 10% 10%, rgba(239, 115, 118, 0.13), transparent 24%),
        radial-gradient(circle at 90% 18%, rgba(102, 185, 216, 0.15), transparent 28%),
        var(--cream);
    }

    .photo-card {
      display: flex;
      flex-direction: column;
      min-height: 100%;
      background: #fff;
      border: 4px solid var(--ink);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 6px 6px 0 var(--ink);
      transition: 0.22s ease;
    }

    .photo-card:hover {
      transform: translate(-4px, -4px) rotate(-0.35deg);
      box-shadow: 10px 10px 0 var(--ink);
    }

    .photo-click-area {
      cursor: pointer;
    }

    .photo-wrap {
      position: relative;
      aspect-ratio: 4 / 3;
      overflow: hidden;
      border-bottom: 4px solid var(--ink);
      background: #ddd;
    }

    .photo-wrap img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      transition: transform 0.45s ease;
    }

    .photo-card:hover .photo-wrap img {
      transform: scale(1.06);
    }

    .work-number {
      position: absolute;
      top: 14px;
      left: 14px;
      padding: 8px 13px;
      border: 3px solid var(--ink);
      border-radius: 999px;
      background: var(--red);
      color: #fff;
      font-size: 14px;
      font-weight: 1000;
      box-shadow: 3px 3px 0 var(--ink);
    }

    .work-group {
      position: absolute;
      top: 14px;
      right: 14px;
      padding: 8px 13px;
      border: 3px solid var(--ink);
      border-radius: 999px;
      background: var(--green);
      color: #fff;
      font-size: 14px;
      font-weight: 1000;
      box-shadow: 3px 3px 0 var(--ink);
    }

    .detail-hint {
      position: absolute;
      right: 14px;
      bottom: 14px;
      padding: 8px 12px;
      border: 3px solid var(--ink);
      border-radius: 999px;
      background: #fff;
      font-size: 13px;
      font-weight: 1000;
      box-shadow: 3px 3px 0 var(--ink);
    }

    .card-body {
      display: flex;
      flex-direction: column;
      flex: 1;
      padding: 18px;
    }

    .card-tag {
      align-self: flex-start;
      margin-bottom: 10px;
      padding: 6px 12px;
      border: 3px solid var(--ink);
      border-radius: 999px;
      background: var(--blue);
      color: #fff;
      font-size: 13px;
      font-weight: 1000;
    }

    .card-title {
      margin: 0;
      font-size: 23px;
      line-height: 1.35;
      font-weight: 1000;
      cursor: pointer;
    }

    .card-author {
      margin: 8px 0 14px;
      font-size: 15px;
      line-height: 1.6;
      font-weight: 800;
      color: #555;
    }

    .card-actions {
      margin-top: auto;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: stretch;
    }

    .vote-btn {
      border: 4px solid var(--ink);
      border-radius: 16px;
      background: var(--red);
      color: #fff;
      padding: 13px 12px;
      font-size: 16px;
      font-weight: 1000;
      cursor: pointer;
      box-shadow: 4px 4px 0 var(--ink);
      transition: 0.18s ease;
    }

    .vote-btn:hover {
      transform: translate(-2px, -2px);
      filter: brightness(1.04);
    }

    .vote-btn.voted {
      background: var(--green);
    }

    .vote-btn.loading {
      opacity: 0.7;
      cursor: wait;
    }

    .vote-count {
      min-width: 82px;
      display: grid;
      place-items: center;
      border: 4px solid var(--ink);
      border-radius: 16px;
      background: var(--paper);
      font-size: 18px;
      font-weight: 1000;
      line-height: 1.1;
      text-align: center;
      box-shadow: 4px 4px 0 var(--ink);
    }

    .vote-count small {
      display: block;
      font-size: 12px;
      font-weight: 900;
    }

    .share-btn {
      grid-column: 1 / -1;
      border: 3px solid var(--ink);
      border-radius: 14px;
      background: var(--yellow);
      padding: 11px 12px;
      font-size: 15px;
      font-weight: 1000;
      cursor: pointer;
      box-shadow: 3px 3px 0 var(--ink);
      transition: 0.18s ease;
    }

    .share-btn:hover {
      transform: translate(-2px, -2px);
    }

    .empty-state {
      grid-column: 1 / -1;
      padding: 50px 20px;
      border: 4px solid var(--ink);
      border-radius: 24px;
      background: #fff;
      text-align: center;
      box-shadow: 6px 6px 0 var(--ink);
    }

    .empty-state h3 {
      margin: 0 0 10px;
      font-size: 28px;
      font-weight: 1000;
    }

    .empty-state p {
      margin: 0;
      font-size: 16px;
      line-height: 1.8;
      font-weight: 800;
      color: #555;
    }

    /* =========================
       作品詳細彈窗
    ========================= */
    .modal {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(0, 0, 0, 0.72);
    }

    .modal.show {
      display: flex;
    }

    .modal-dialog {
      position: relative;
      width: min(1050px, 100%);
      max-height: min(90vh, 900px);
      overflow-y: auto;
      padding: 22px;
      border: 5px solid var(--ink);
      border-radius: 30px;
      background:
        repeating-linear-gradient(
          90deg,
          rgba(239, 115, 118, 0.16) 0 40px,
          rgba(255, 255, 255, 0.05) 40px 46px,
          rgba(102, 185, 216, 0.16) 46px 86px,
          rgba(255, 255, 255, 0.05) 86px 92px,
          rgba(104, 181, 141, 0.16) 92px 132px,
          rgba(255, 255, 255, 0.05) 132px 138px
        ),
        var(--cream);
      box-shadow: 10px 10px 0 var(--ink);
    }

    .modal-close {
      position: sticky;
      top: 0;
      margin-left: auto;
      margin-bottom: 10px;
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      border: 4px solid var(--ink);
      border-radius: 50%;
      background: var(--red);
      color: #fff;
      font-size: 22px;
      font-weight: 1000;
      cursor: pointer;
      box-shadow: 4px 4px 0 var(--ink);
      z-index: 3;
    }

    .detail-panel {
      padding: 20px;
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 24px;
      border: 4px solid var(--ink);
      border-radius: 26px;
      background: #fff;
    }

    .detail-image {
      min-height: 440px;
      overflow: hidden;
      border: 4px solid var(--ink);
      border-radius: 24px;
      background: #eee;
    }

    .detail-image img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .detail-top-labels {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .detail-label {
      display: inline-block;
      padding: 7px 14px;
      border: 3px solid var(--ink);
      border-radius: 999px;
      color: #fff;
      font-size: 14px;
      font-weight: 1000;
    }

    .detail-label.group {
      background: var(--red);
    }

    .detail-label.theme {
      background: var(--green);
    }

    .detail-title {
      margin: 0 0 18px;
      font-size: clamp(28px, 4vw, 40px);
      line-height: 1.3;
      font-weight: 1000;
    }

    .detail-list {
      display: grid;
      gap: 11px;
      margin-bottom: 18px;
    }

    .detail-row {
      display: grid;
      grid-template-columns: 112px 1fr;
      gap: 12px;
      align-items: start;
      padding-bottom: 11px;
      border-bottom: 2px dashed #d8d2c4;
      font-size: 16px;
      line-height: 1.75;
    }

    .detail-row strong {
      font-weight: 1000;
    }

    .detail-description {
      padding: 16px;
      margin-bottom: 18px;
      border: 3px solid var(--ink);
      border-radius: 18px;
      background: var(--paper);
      font-size: 16px;
      line-height: 1.9;
      font-weight: 700;
    }

    .detail-vote-box {
      margin-top: auto;
      padding: 16px;
      border: 4px solid var(--ink);
      border-radius: 20px;
      background: #fff5d3;
    }

    .detail-vote-count {
      margin-bottom: 12px;
      font-size: 19px;
      font-weight: 1000;
    }

    .detail-vote-count span {
      display: inline-block;
      margin-left: 6px;
      padding: 5px 12px;
      border: 3px solid var(--ink);
      border-radius: 999px;
      background: var(--red);
      color: #fff;
      font-size: 22px;
    }

    .detail-action-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .detail-share-btn {
      border: 4px solid var(--ink);
      border-radius: 16px;
      background: var(--yellow);
      padding: 13px 12px;
      font-size: 16px;
      font-weight: 1000;
      cursor: pointer;
      box-shadow: 4px 4px 0 var(--ink);
      transition: 0.18s ease;
    }

    .detail-share-btn:hover {
      transform: translate(-2px, -2px);
    }

    /* =========================
       提示訊息
    ========================= */
    .toast {
      position: fixed;
      left: 50%;
      bottom: 28px;
      z-index: 10000;
      transform: translateX(-50%) translateY(20px);
      opacity: 0;
      pointer-events: none;
      padding: 13px 20px;
      border: 4px solid var(--ink);
      border-radius: 999px;
      background: var(--ink);
      color: #fff;
      font-size: 15px;
      font-weight: 1000;
      box-shadow: 5px 5px 0 rgba(0, 0, 0, 0.25);
      transition: 0.25s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* =========================
       平板
    ========================= */
    @media (max-width: 980px) {
      .side-badge {
        display: none;
      }

      .intro-board {
        grid-template-columns: 1fr;
      }

      .toolbar {
        grid-template-columns: 1fr;
      }

      .sort-group {
        justify-content: flex-start;
      }

      .gallery {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .detail-panel {
        grid-template-columns: 1fr;
      }

      .detail-image {
        min-height: auto;
        aspect-ratio: 4 / 3;
      }
    }

    /* =========================
       手機
    ========================= */
    @media (max-width: 680px) {
      .page {
        width: calc(100% - 16px);
        margin: 10px auto 26px;
        border-radius: 24px;
      }

      .hero {
        padding: 24px 16px 116px;
      }

      .eyebrow {
        font-size: 14px;
        padding: 7px 13px;
      }

      .hero h1 {
        font-size: 47px;
      }

      .hero-subtitle {
        font-size: 15px;
        padding: 10px 15px;
        border-width: 3px;
        box-shadow: 3px 3px 0 var(--ink);
      }

      .intro-board {
        margin-top: 22px;
        padding: 14px;
        border-radius: 22px;
        box-shadow: 5px 5px 0 var(--ink);
      }

      .intro-text,
      .intro-rule {
        padding: 16px;
      }

      .intro-text h2 {
        font-size: 24px;
      }

      .intro-text p,
      .intro-rule ul {
        font-size: 15px;
      }

      .hero-group-tabs {
        left: 16px;
        right: 16px;
        bottom: 18px;
        width: auto;
        transform: none;
        gap: 12px;
      }

      .group-btn {
        flex: 1;
        min-width: 0;
        height: 64px;
        border-width: 4px;
        font-size: 20px;
        box-shadow: 4px 4px 0 var(--ink);
      }

      .works-area {
        padding: 22px 16px 0;
      }

      .works-title {
        font-size: 29px;
      }

      .works-title span {
        width: 44px;
        height: 44px;
      }

      .toolbar {
        padding: 16px 16px 20px;
      }

      .search-box {
        max-width: none;
      }

      .search-input {
        height: 54px;
        font-size: 15px;
      }

      .sort-group {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }

      .sort-btn {
        padding: 12px 10px;
      }

      .result-bar {
        padding: 14px 16px 0;
      }

      .gallery {
        grid-template-columns: 1fr;
        padding: 18px 16px 26px;
      }

      .card-title {
        font-size: 21px;
      }

      .modal {
        padding: 12px;
      }

      .modal-dialog {
        padding: 14px;
        border-radius: 24px;
      }

      .detail-panel {
        padding: 14px;
        border-radius: 20px;
        gap: 16px;
      }

      .detail-row {
        grid-template-columns: 1fr;
        gap: 2px;
      }

      .detail-action-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <main class="page">

    <!-- 主視覺 -->
    <section class="hero">
      <div class="side-badge left">
        <span>里</span>
        <span>民</span>
      </div>

      <div class="side-badge right">
        <span>投</span>
        <span>票</span>
      </div>

      <div class="hero-copy">
        <div class="eyebrow">● 沒有要集資的那本 ●</div>

        <h1>
          <small>新新厝邊生活</small>
          照片人氣投票
        </h1>

        <div class="hero-subtitle">
          點開作品看完整故事，投下你最喜歡的一票！
        </div>
      </div>

      <div class="intro-board">
        <div class="intro-text">
          <h2>📸 一張照片，一段屬於生活的記憶</h2>
          <p>
            本次照片投票分為「社會組」與「大專組」。
            點開照片可查看完整作品內容，也可以透過「分享拉票」邀請親友一起支持喜歡的作品。
          </p>
        </div>

        <div class="intro-rule">
          <div class="intro-rule-title">投票方式</div>
          <ul>
            <li>切換組別瀏覽作品</li>
            <li>搜尋編號、名稱或參賽者</li>
            <li>點擊照片查看詳細內容</li>
            <li>分享單一作品幫忙拉票</li>
          </ul>
        </div>
      </div>

      <div class="hero-group-tabs">
        <button class="group-btn active" data-group="social">社會組</button>
        <button class="group-btn" data-group="college">大專組</button>
      </div>
    </section>

    <!-- 參賽作品 -->
    <section class="works-area">
      <div class="works-header">
        <div class="works-title">
          <span>＋</span>
          參賽作品
        </div>
      </div>
    </section>

    <!-- 搜尋與排序 -->
    <section class="toolbar">
      <div class="search-box">
        <input
          type="text"
          class="search-input"
          id="searchInput"
          placeholder="搜尋作品編號、作品名稱、參賽者或拍攝主題"
        />
        <div class="search-icon">⌕</div>
      </div>

      <div class="sort-group">
        <button class="sort-btn active" data-sort="number">編號排序</button>
        <button class="sort-btn" data-sort="votes">人氣最高</button>
      </div>
    </section>

    <div class="result-bar" id="resultBar"></div>

    <div class="loading-box" id="loadingBox">
      作品載入中，請稍候…
    </div>

    <!-- 照片卡片 -->
    <section class="gallery" id="gallery" style="display:none;"></section>
  </main>

  <!-- 作品詳細彈窗 -->
  <div class="modal" id="detailModal">
    <div class="modal-dialog">
      <button class="modal-close" id="modalClose">×</button>

      <div class="detail-panel">
        <div class="detail-image">
          <img id="modalImage" src="" alt="">
        </div>

        <div class="detail-info">
          <div class="detail-top-labels">
            <div class="detail-label group" id="modalGroup"></div>
            <div class="detail-label theme" id="modalTheme"></div>
          </div>

          <h2 class="detail-title" id="modalTitle"></h2>

          <div class="detail-list">
            <div class="detail-row">
              <strong>作品編號</strong>
              <div id="modalNumber"></div>
            </div>

            <div class="detail-row">
              <strong>作品名稱</strong>
              <div id="modalWorkName"></div>
            </div>

            <div class="detail-row">
              <strong>參賽者名稱</strong>
              <div id="modalAuthor"></div>
            </div>

            <div class="detail-row">
              <strong>拍攝主題</strong>
              <div id="modalPhotoTheme"></div>
            </div>
          </div>

          <div class="detail-description" id="modalDescription"></div>

          <div class="detail-vote-box">
            <div class="detail-vote-count">
              人氣票數
              <span id="modalVotes"></span>
            </div>

            <div class="detail-action-row">
              <button class="vote-btn" id="modalVoteBtn">
                ❤ 投這個作品一票
              </button>

              <button class="detail-share-btn" id="modalShareBtn">
                📣 分享這件作品拉票
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    /**********************************************
     * 1. 請把這裡換成 Apps Script Web App URL
     **********************************************/
    const API_URL = "https://script.google.com/macros/s/AKfycbyjF8idieIUWms-JI-1sGyQe7tRzPdd5SEagG8fwZG9C-1IWQLY7wi1k6lLmVo8ftp1Xg/exec";


    /**********************************************
     * 2. 全域狀態
     **********************************************/
    let works = [];
    let currentGroup = "social";
    let currentSort = "number";
    let currentKeyword = "";
    let currentWorkId = null;

    const votedToday = new Set();
    const pendingVotes = new Set();

    const voterId = getOrCreateVoterId();


    /**********************************************
     * 3. 匿名投票者 ID
     **********************************************/
    function getOrCreateVoterId() {
      const storageKey = "photo_vote_voter_id";
      let id = localStorage.getItem(storageKey);

      if (!id) {
        if (window.crypto && crypto.randomUUID) {
          id = crypto.randomUUID();
        } else {
          id =
            "voter_" +
            Date.now() +
            "_" +
            Math.random().toString(36).slice(2, 12);
        }

        localStorage.setItem(storageKey, id);
      }

      return id;
    }


    /**********************************************
     * 4. 讀取 Google Sheet 作品資料
     **********************************************/
    async function loadWorks() {
      try {
        const url =
          `${API_URL}?action=getWorks` +
          `&voter_id=${encodeURIComponent(voterId)}` +
          `&t=${Date.now()}`;

        const response = await fetch(url);
        const data = await response.json();

        if (!data.ok) {
          throw new Error(data.message || "作品資料載入失敗");
        }

        works = Array.isArray(data.works) ? data.works : [];

        votedToday.clear();
        (data.voted_today || []).forEach(workId => votedToday.add(workId));

        document.getElementById("loadingBox").style.display = "none";
        document.getElementById("gallery").style.display = "grid";

        applyUrlStateAfterLoad();
        renderGallery();

      } catch (error) {
        document.getElementById("loadingBox").innerHTML =
          `作品載入失敗：${escapeHtml(error.message || "請稍後再試")}`;

        showToast("作品載入失敗，請確認 API 網址與部署設定");
      }
    }


    /**********************************************
     * 5. 篩選、搜尋、排序
     **********************************************/
    function getVisibleWorks() {
      let result = works.filter(work => work.group_key === currentGroup);

      if (currentKeyword.trim()) {
        const keyword = currentKeyword.trim().toLowerCase();

        result = result.filter(work => {
          const searchableText = [
            work.display_number,
            work.work_name,
            work.participant_name,
            work.shooting_theme
          ].join(" ").toLowerCase();

          return searchableText.includes(keyword);
        });
      }

      if (currentSort === "number") {
        result.sort((a, b) =>
          String(a.display_number || "").localeCompare(
            String(b.display_number || ""),
            "zh-Hant",
            { numeric: true }
          )
        );
      }

      if (currentSort === "votes") {
        result.sort((a, b) => Number(b.votes || 0) - Number(a.votes || 0));
      }

      return result;
    }


    /**********************************************
     * 6. 渲染卡片
     **********************************************/
    function renderGallery() {
      const gallery = document.getElementById("gallery");
      const resultBar = document.getElementById("resultBar");
      const visibleWorks = getVisibleWorks();

      const groupText = currentGroup === "social" ? "社會組" : "大專組";

      if (currentKeyword.trim()) {
        resultBar.innerHTML =
          `目前顯示 <strong>${groupText}</strong> 中，符合「${escapeHtml(currentKeyword)}」的 ` +
          `<strong>${visibleWorks.length}</strong> 件作品`;
      } else {
        resultBar.innerHTML =
          `目前顯示 <strong>${groupText}</strong> 共 ` +
          `<strong>${visibleWorks.length}</strong> 件作品`;
      }

      if (!visibleWorks.length) {
        gallery.innerHTML = `
          <div class="empty-state">
            <h3>找不到符合條件的作品</h3>
            <p>請換個關鍵字，或切換另一個組別查看。</p>
          </div>
        `;
        return;
      }

      gallery.innerHTML = visibleWorks.map(work => {
        const isVoted = votedToday.has(work.work_id);
        const isLoading = pendingVotes.has(work.work_id);

        return `
          <article class="photo-card">
            <div class="photo-click-area" onclick="openModal('${escapeJs(work.work_id)}')">
              <div class="photo-wrap">
                <img src="${escapeHtml(work.image_url)}" alt="${escapeHtml(work.work_name)}">
                <div class="work-number">${escapeHtml(work.display_number)}</div>
                <div class="work-group">${escapeHtml(work.group_name)}</div>
                <div class="detail-hint">點我看詳情</div>
              </div>
            </div>

            <div class="card-body">
              <div class="photo-click-area" onclick="openModal('${escapeJs(work.work_id)}')">
                <div class="card-tag">${escapeHtml(work.shooting_theme)}</div>
                <h3 class="card-title">${escapeHtml(work.work_name)}</h3>
                <div class="card-author">參賽者｜${escapeHtml(work.participant_name)}</div>
              </div>

              <div class="card-actions">
                <button
                  class="vote-btn ${isVoted ? "voted" : ""} ${isLoading ? "loading" : ""}"
                  onclick="voteWork('${escapeJs(work.work_id)}')"
                >
                  ${
                    isLoading
                      ? "投票送出中…"
                      : isVoted
                        ? "✓ 今天已投過"
                        : "❤ 投這個作品一票"
                  }
                </button>

                <div class="vote-count">
                  ${Number(work.votes || 0)}
                  <small>票</small>
                </div>

                <button
                  class="share-btn"
                  onclick="shareWork('${escapeJs(work.work_id)}')"
                >
                  📣 分享這件作品拉票
                </button>
              </div>
            </div>
          </article>
        `;
      }).join("");
    }


    /**********************************************
     * 7. 開啟作品詳細彈窗
     **********************************************/
    function openModal(workId) {
      const work = works.find(item => item.work_id === workId);
      if (!work) return;

      currentWorkId = workId;

      document.getElementById("modalImage").src = work.image_url;
      document.getElementById("modalImage").alt = work.work_name;
      document.getElementById("modalGroup").textContent = work.group_name;
      document.getElementById("modalTheme").textContent = work.shooting_theme;
      document.getElementById("modalTitle").textContent = work.work_name;
      document.getElementById("modalNumber").textContent = work.display_number;
      document.getElementById("modalWorkName").textContent = work.work_name;
      document.getElementById("modalAuthor").textContent = work.participant_name;
      document.getElementById("modalPhotoTheme").textContent = work.shooting_theme;
      document.getElementById("modalDescription").textContent = work.description;
      document.getElementById("modalVotes").textContent = Number(work.votes || 0);

      updateModalVoteButton(workId);

      document.getElementById("detailModal").classList.add("show");

      const newUrl = new URL(window.location.href);
      newUrl.searchParams.set("group", work.group_key);
      newUrl.searchParams.set("work_id", work.work_id);
      window.history.replaceState({}, "", newUrl);
    }


    function closeModal() {
      document.getElementById("detailModal").classList.remove("show");
      currentWorkId = null;

      const newUrl = new URL(window.location.href);
      newUrl.searchParams.delete("work_id");
      window.history.replaceState({}, "", newUrl);
    }


    function updateModalVoteButton(workId) {
      const button = document.getElementById("modalVoteBtn");
      const isVoted = votedToday.has(workId);
      const isLoading = pendingVotes.has(workId);

      button.classList.toggle("voted", isVoted);
      button.classList.toggle("loading", isLoading);

      button.textContent = isLoading
        ? "投票送出中…"
        : isVoted
          ? "✓ 今天已投過"
          : "❤ 投這個作品一票";
    }


    /**********************************************
     * 8. 投票
     **********************************************/
    async function voteWork(workId) {
      if (votedToday.has(workId)) {
        showToast("你今天已經投過這件作品囉！");
        return;
      }

      if (pendingVotes.has(workId)) {
        return;
      }

      pendingVotes.add(workId);
      renderGallery();

      if (currentWorkId === workId) {
        updateModalVoteButton(workId);
      }

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "text/plain;charset=utf-8"
          },
          body: JSON.stringify({
            action: "vote",
            work_id: workId,
            voter_id: voterId
          })
        });

        const data = await response.json();

        if (!data.ok) {
          if (data.code === "DUPLICATE_TODAY") {
            votedToday.add(workId);
            showToast("你今天已經投過這件作品囉！");
          } else {
            throw new Error(data.message || "投票失敗");
          }
        } else {
          votedToday.add(workId);

          const target = works.find(item => item.work_id === workId);
          if (target) {
            target.votes = Number(data.votes || target.votes || 0);
          }

          showToast("投票成功，謝謝你的支持！");
        }

      } catch (error) {
        showToast(error.message || "投票失敗，請稍後再試");
      } finally {
        pendingVotes.delete(workId);
        renderGallery();

        if (currentWorkId === workId) {
          const target = works.find(item => item.work_id === workId);
          if (target) {
            document.getElementById("modalVotes").textContent = Number(target.votes || 0);
          }

          updateModalVoteButton(workId);
        }
      }
    }


    /**********************************************
     * 9. 分享拉票
     **********************************************/
    async function shareWork(workId) {
      const work = works.find(item => item.work_id === workId);
      if (!work) return;

      const shareUrl = new URL(window.location.href);
      shareUrl.searchParams.set("group", work.group_key);
      shareUrl.searchParams.set("work_id", work.work_id);

      const shareText =
        `我正在支持「${work.work_name}」這件作品！` +
        `快來幫 ${work.participant_name} 投票，一起幫這張照片拉人氣！`;

      if (navigator.share) {
        try {
          await navigator.share({
            title: `幫「${work.work_name}」投一票`,
            text: shareText,
            url: shareUrl.toString()
          });
        } catch (error) {
          // 使用者取消分享，不顯示提示
        }
      } else {
        try {
          await navigator.clipboard.writeText(
            `${shareText}\n${shareUrl.toString()}`
          );
          showToast("拉票連結已複製，可以直接貼給朋友！");
        } catch (error) {
          showToast("瀏覽器不支援自動複製，請手動複製網址分享。");
        }
      }
    }


    /**********************************************
     * 10. 組別、搜尋、排序事件
     **********************************************/
    function setGroup(group) {
      currentGroup = group;
      currentKeyword = "";
      document.getElementById("searchInput").value = "";

      document.querySelectorAll(".group-btn").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.group === group);
      });

      const newUrl = new URL(window.location.href);
      newUrl.searchParams.set("group", group);
      newUrl.searchParams.delete("work_id");
      window.history.replaceState({}, "", newUrl);

      renderGallery();
    }


    document.querySelectorAll(".group-btn").forEach(button => {
      button.addEventListener("click", () => {
        setGroup(button.dataset.group);
      });
    });


    document.querySelectorAll(".sort-btn").forEach(button => {
      button.addEventListener("click", () => {
        document.querySelectorAll(".sort-btn").forEach(btn => {
          btn.classList.remove("active");
        });

        button.classList.add("active");
        currentSort = button.dataset.sort;
        renderGallery();
      });
    });


    document.getElementById("searchInput").addEventListener("input", function() {
      currentKeyword = this.value;
      renderGallery();
    });


    /**********************************************
     * 11. Modal 事件
     **********************************************/
    document.getElementById("modalClose").addEventListener("click", closeModal);

    document.getElementById("detailModal").addEventListener("click", function(event) {
      if (event.target === this) {
        closeModal();
      }
    });

    document.getElementById("modalVoteBtn").addEventListener("click", function() {
      if (currentWorkId) {
        voteWork(currentWorkId);
      }
    });

    document.getElementById("modalShareBtn").addEventListener("click", function() {
      if (currentWorkId) {
        shareWork(currentWorkId);
      }
    });


    /**********************************************
     * 12. 分享網址開頁處理
     **********************************************/
    function applyUrlStateAfterLoad() {
      const urlParams = new URLSearchParams(window.location.search);
      const sharedGroup = urlParams.get("group");
      const sharedWorkId = urlParams.get("work_id");

      if (sharedGroup === "social" || sharedGroup === "college") {
        currentGroup = sharedGroup;
      }

      document.querySelectorAll(".group-btn").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.group === currentGroup);
      });

      if (sharedWorkId) {
        const target = works.find(item => item.work_id === sharedWorkId);

        if (target) {
          currentGroup = target.group_key;

          document.querySelectorAll(".group-btn").forEach(btn => {
            btn.classList.toggle("active", btn.dataset.group === currentGroup);
          });

          setTimeout(() => {
            openModal(sharedWorkId);
          }, 50);
        }
      }
    }


    /**********************************************
     * 13. 提示訊息
     **********************************************/
    function showToast(message) {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.classList.add("show");

      clearTimeout(window.toastTimer);
      window.toastTimer = setTimeout(() => {
        toast.classList.remove("show");
      }, 2400);
    }


    /**********************************************
     * 14. 基礎字串安全處理
     **********************************************/
    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeJs(value) {
      return String(value ?? "")
        .replaceAll("\\", "\\\\")
        .replaceAll("'", "\\'");
    }


    /**********************************************
     * 15. 啟動
     **********************************************/
    loadWorks();
  </script>
</body>
</html>
