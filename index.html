<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>照片人氣投票</title>

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --red: #ef7376;
      --blue: #66b9d8;
      --green: #68b58d;
      --cream: #fff7e6;
      --paper: #fffdf7;
      --yellow: #ffd65a;
      --ink: #272727;
      --muted: #6b655b;
      --soft-line: #d8d2c4;
      --shadow: 5px 5px 0 var(--ink);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
      background: #242424;
      color: var(--ink);
    }

    body.modal-open {
      overflow: hidden;
    }

    button,
    input {
      font-family: inherit;
    }

    button {
      -webkit-tap-highlight-color: transparent;
    }

    .page {
      width: min(1180px, calc(100% - 28px));
      margin: 18px auto 42px;
      padding-bottom: 104px;
      background: var(--cream);
      border: 5px solid var(--ink);
      border-radius: 34px;
      overflow: visible;
      box-shadow: 0 14px 0 rgba(0, 0, 0, 0.26);
    }

    /* =========================
       主視覺區
    ========================= */
    .hero {
      position: relative;
      padding: 28px 28px 112px;
      border-bottom: 5px solid var(--ink);
      border-radius: 28px 28px 0 0;
      background:
        repeating-linear-gradient(
          90deg,
          var(--red) 0 48px,
          #fff4ee 48px 54px,
          var(--blue) 54px 102px,
          #fff4ee 102px 108px,
          var(--green) 108px 156px,
          #fff4ee 156px 162px
        );
    }

    .side-badge {
      position: absolute;
      top: 20px;
      width: 68px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      z-index: 2;
    }

    .side-badge.left {
      left: 20px;
    }

    .side-badge.right {
      right: 20px;
    }

    .side-badge span {
      width: 68px;
      height: 68px;
      border-radius: 50%;
      border: 4px solid var(--ink);
      background: var(--paper);
      display: grid;
      place-items: center;
      font-size: 27px;
      font-weight: 1000;
      box-shadow: 3px 3px 0 var(--ink);
    }

    .hero-copy {
      max-width: 820px;
      margin: 0 auto;
      text-align: center;
    }

    .eyebrow {
      display: inline-block;
      padding: 7px 17px;
      border-radius: 999px;
      background: var(--ink);
      color: #fff;
      font-size: 17px;
      font-weight: 1000;
      letter-spacing: 1px;
      transform: rotate(-1deg);
      box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.25);
    }

    .hero h1 {
      margin: 14px 0 8px;
      color: #fff;
      font-size: clamp(44px, 7.5vw, 88px);
      line-height: 0.98;
      font-weight: 1000;
      letter-spacing: 2px;
      text-shadow:
        4px 4px 0 var(--ink),
        8px 8px 0 rgba(0, 0, 0, 0.18);
    }

    .hero h1 small {
      display: block;
      font-size: 0.48em;
      margin-bottom: 6px;
    }

    .hero-subtitle {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 18px;
      background: var(--paper);
      border: 4px solid var(--ink);
      border-radius: 999px;
      font-size: 17px;
      font-weight: 1000;
      box-shadow: var(--shadow);
    }

    .intro-board {
      max-width: 940px;
      margin: 22px auto 0;
      padding: 16px;
      background: rgba(255, 253, 247, 0.96);
      border: 5px solid var(--ink);
      border-radius: 26px;
      box-shadow: 8px 8px 0 var(--ink);
      display: grid;
      grid-template-columns: 1.35fr 0.85fr;
      gap: 14px;
    }

    .intro-text,
    .intro-rule {
      border: 4px solid var(--ink);
      border-radius: 20px;
      padding: 16px;
      background: #fff;
    }

    .intro-text h2 {
      margin: 0 0 8px;
      font-size: 27px;
      line-height: 1.35;
      font-weight: 1000;
    }

    .intro-text p {
      margin: 0;
      font-size: 16px;
      line-height: 1.8;
      font-weight: 700;
    }

    .intro-rule {
      background: var(--green);
      color: #fff;
    }

    .intro-rule-title {
      display: inline-block;
      margin-bottom: 10px;
      padding: 6px 14px;
      border: 3px solid var(--ink);
      border-radius: 999px;
      background: var(--paper);
      color: var(--ink);
      font-size: 14px;
      font-weight: 1000;
    }

    .intro-rule ul {
      margin: 0;
      padding-left: 20px;
      font-size: 15px;
      line-height: 1.85;
      font-weight: 900;
    }

    /* =========================
       組別切換按鈕
    ========================= */
    .hero-group-tabs {
      position: absolute;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      z-index: 10;
      width: min(940px, calc(100% - 56px));
    }

    .group-btn {
      flex: 1;
      min-width: 0;
      height: 76px;
      border: 5px solid var(--ink);
      border-radius: 999px;
      background: var(--paper);
      color: var(--ink);
      font-size: 26px;
      font-weight: 1000;
      cursor: pointer;
      box-shadow: 7px 7px 0 var(--ink);
      transition:
        transform 0.18s ease,
        background 0.18s ease,
        color 0.18s ease;
    }

    .group-btn:hover {
      transform: translate(-3px, -3px);
    }

    .group-btn.active {
      background: var(--red);
      color: #fff;
    }

    /* =========================
       參賽作品標題
    ========================= */
    .works-area {
      padding: 24px 24px 0;
      background: var(--cream);
    }

    .works-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .works-title {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 33px;
      font-weight: 1000;
    }

    .works-title span {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      border: 3px solid var(--ink);
      background: var(--yellow);
      box-shadow: 3px 3px 0 var(--ink);
    }

    /* =========================
       下方固定搜尋列
    ========================= */
    .toolbar {
      position: fixed;
      left: 50%;
      bottom: max(18px, env(safe-area-inset-bottom));
      transform: translateX(-50%);
      z-index: 300;

      width: min(860px, calc(100% - 40px));
      padding: 14px;
      border: 4px solid var(--ink);
      border-radius: 999px;
      background: rgba(255, 247, 230, 0.96);
      backdrop-filter: blur(12px);
      box-shadow: 7px 7px 0 var(--ink);

      display: flex;
      align-items: center;
      justify-content: center;
    }

    .search-box {
      position: relative;
      width: 100%;
      max-width: none;
    }

    .search-input {
      width: 100%;
      height: 58px;
      padding: 0 98px 0 20px;
      border: 4px solid var(--ink);
      border-radius: 999px;
      background: #fff;
      font-size: 16px;
      font-weight: 800;
      outline: none;
      box-shadow: 4px 4px 0 var(--ink);
    }

    .search-input:focus {
      background: #fffdf0;
    }

    .search-clear {
      position: absolute;
      right: 54px;
      top: 50%;
      transform: translateY(-50%);
      width: 30px;
      height: 30px;
      border: 3px solid var(--ink);
      border-radius: 50%;
      background: var(--yellow);
      color: var(--ink);
      display: none;
      place-items: center;
      font-size: 16px;
      font-weight: 1000;
      cursor: pointer;
    }

    .search-clear.show {
      display: grid;
    }

    .search-icon {
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 24px;
      font-weight: 1000;
      pointer-events: none;
    }

    .result-bar {
      padding: 10px 24px 0;
      font-size: 15px;
      line-height: 1.7;
      font-weight: 900;
      color: #555;
      background: var(--cream);
    }

    .result-bar strong {
      color: var(--red);
      font-size: 18px;
    }

    /* =========================
       Skeleton Loading
    ========================= */
    .skeleton-gallery {
      padding-top: 18px;
    }

    .skeleton-card {
      border: 4px solid var(--ink);
      border-radius: 22px;
      background: #fff;
      overflow: hidden;
      box-shadow: 6px 6px 0 var(--ink);
    }

    .skeleton-image,
    .skeleton-line,
    .skeleton-button,
    .skeleton-count {
      position: relative;
      overflow: hidden;
      background: #eadfcb;
    }

    .skeleton-image::after,
    .skeleton-line::after,
    .skeleton-button::after,
    .skeleton-count::after {
      content: "";
      position: absolute;
      inset: 0;
      transform: translateX(-100%);
      background: linear-gradient(
        90deg,
        transparent,
        rgba(255, 255, 255, 0.55),
        transparent
      );
      animation: shimmer 1.35s infinite;
    }

    @keyframes shimmer {
      100% {
        transform: translateX(100%);
      }
    }

    .skeleton-image {
      aspect-ratio: 16 / 10;
      border-bottom: 4px solid var(--ink);
    }

    .skeleton-body {
      padding: 16px;
    }

    .skeleton-line {
      height: 17px;
      border-radius: 999px;
      margin-bottom: 11px;
    }

    .skeleton-line.short {
      width: 36%;
    }

    .skeleton-line.medium {
      width: 72%;
    }

    .skeleton-line.long {
      width: 92%;
    }

    .skeleton-actions {
      display: grid;
      grid-template-columns: 1fr 82px;
      gap: 10px;
      margin-top: 16px;
    }

    .skeleton-button,
    .skeleton-count {
      height: 54px;
      border-radius: 16px;
    }

    /* =========================
       作品卡片
    ========================= */
    .gallery {
      padding: 18px 24px 20px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 20px;
      background:
        radial-gradient(circle at 10% 10%, rgba(239, 115, 118, 0.13), transparent 24%),
        radial-gradient(circle at 90% 18%, rgba(102, 185, 216, 0.15), transparent 28%),
        var(--cream);
    }

    .photo-card {
      display: flex;
      flex-direction: column;
      min-height: 100%;
      background: #fff;
      border: 4px solid var(--ink);
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 6px 6px 0 var(--ink);
      transition: 0.22s ease;
    }

    .photo-card:hover {
      transform: translate(-4px, -4px) rotate(-0.35deg);
      box-shadow: 10px 10px 0 var(--ink);
    }

    .photo-click-area {
      cursor: pointer;
    }

    .photo-wrap {
      position: relative;
      aspect-ratio: 16 / 10;
      overflow: hidden;
      border-bottom: 4px solid var(--ink);
      background: #ddd;
    }

    .photo-wrap img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      transition: transform 0.45s ease;
    }

    .photo-card:hover .photo-wrap img {
      transform: scale(1.06);
    }

    .work-number {
      position: absolute;
      top: 12px;
      left: 12px;
      padding: 7px 12px;
      border: 3px solid var(--ink);
      border-radius: 999px;
      background: var(--red);
      color: #fff;
      font-size: 14px;
      font-weight: 1000;
      box-shadow: 3px 3px 0 var(--ink);
    }

    .detail-hint {
      position: absolute;
      right: 12px;
      bottom: 12px;
      padding: 7px 11px;
      border: 3px solid var(--ink);
      border-radius: 999px;
      background: #fff;
      font-size: 13px;
      font-weight: 1000;
      box-shadow: 3px 3px 0 var(--ink);
    }

    .card-body {
      display: flex;
      flex-direction: column;
      flex: 1;
      padding: 16px;
    }

    .card-tag {
      align-self: flex-start;
      margin-bottom: 9px;
      padding: 5px 11px;
      border: 3px solid var(--ink);
      border-radius: 999px;
      background: var(--blue);
      color: #fff;
      font-size: 13px;
      font-weight: 1000;
    }

    .card-title {
      margin: 0;
      font-size: 21px;
      line-height: 1.35;
      font-weight: 1000;
      cursor: pointer;
    }

    .card-author {
      margin: 7px 0 12px;
      font-size: 14px;
      line-height: 1.6;
      font-weight: 800;
      color: #555;
    }

    .card-actions {
      margin-top: auto;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: stretch;
    }

    .vote-btn {
      border: 4px solid var(--ink);
      border-radius: 16px;
      background: var(--red);
      color: #fff;
      padding: 12px 12px;
      font-size: 15px;
      font-weight: 1000;
      cursor: pointer;
      box-shadow: 4px 4px 0 var(--ink);
      transition: 0.18s ease;
    }

    .vote-btn:hover {
      transform: translate(-2px, -2px);
      filter: brightness(1.04);
    }

    .vote-btn.voted {
      background: var(--green);
    }

    .vote-btn.loading {
      opacity: 0.7;
      cursor: wait;
    }

    .vote-btn.vote-success-pop {
      animation: voteButtonPop 0.55s ease;
    }

    @keyframes voteButtonPop {
      0% {
        transform: scale(1);
      }
      40% {
        transform: scale(1.05);
      }
      100% {
        transform: scale(1);
      }
    }

    .vote-count {
      min-width: 80px;
      display: grid;
      place-items: center;
      border: 4px solid var(--ink);
      border-radius: 16px;
      background: var(--paper);
      font-size: 18px;
      font-weight: 1000;
      line-height: 1.1;
      text-align: center;
      box-shadow: 4px 4px 0 var(--ink);
    }

    .vote-count small {
      display: block;
      font-size: 12px;
      font-weight: 900;
    }

    .vote-count.vote-pulse {
      animation: voteCountPulse 0.75s ease;
    }

    @keyframes voteCountPulse {
      0% {
        transform: scale(1);
      }
      35% {
        transform: scale(1.12) rotate(-1deg);
      }
      100% {
        transform: scale(1);
      }
    }

    /* =========================
       載入更多
    ========================= */
    .load-more-wrap {
      display: flex;
      justify-content: center;
      padding: 2px 24px 20px;
      background: var(--cream);
    }

    .load-more-wrap[hidden] {
      display: none;
    }

    .load-more-btn {
      min-width: min(420px, 100%);
      border: 4px solid var(--ink);
      border-radius: 999px;
      padding: 17px 28px;
      background: var(--yellow);
      color: var(--ink);
      font-size: 18px;
      font-weight: 1000;
      cursor: pointer;
      box-shadow: 5px 5px 0 var(--ink);
      transition: 0.18s ease;
    }

    .load-more-btn:hover {
      transform: translate(-3px, -3px);
    }

    /* =========================
       空狀態
    ========================= */
    .empty-state {
      grid-column: 1 / -1;
      padding: 42px 20px;
      border: 4px solid var(--ink);
      border-radius: 24px;
      background: #fff;
      text-align: center;
      box-shadow: 6px 6px 0 var(--ink);
    }

    .empty-state h3 {
      margin: 0 0 10px;
      font-size: 27px;
      font-weight: 1000;
    }

    .empty-state p {
      margin: 0 0 18px;
      font-size: 16px;
      line-height: 1.8;
      font-weight: 800;
      color: #555;
    }

    .empty-clear-btn {
      border: 3px solid var(--ink);
      border-radius: 999px;
      background: var(--yellow);
      padding: 12px 22px;
      font-size: 15px;
      font-weight: 1000;
      cursor: pointer;
      box-shadow: 3px 3px 0 var(--ink);
      transition: 0.18s ease;
    }

    .empty-clear-btn:hover {
      transform: translate(-2px, -2px);
    }

    /* =========================
       作品詳細彈窗
    ========================= */
    .modal {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(0, 0, 0, 0.72);
    }

    .modal.show {
      display: flex;
    }

    .modal-dialog {
      position: relative;
      width: min(1080px, 100%);
      max-height: min(92vh, 940px);
      overflow-y: auto;
      padding: 22px;
      border: 5px solid var(--ink);
      border-radius: 30px;
      background:
        repeating-linear-gradient(
          90deg,
          rgba(239, 115, 118, 0.16) 0 40px,
          rgba(255, 255, 255, 0.05) 40px 46px,
          rgba(102, 185, 216, 0.16) 46px 86px,
          rgba(255, 255, 255, 0.05) 86px 92px,
          rgba(104, 181, 141, 0.16) 92px 132px,
          rgba(255, 255, 255, 0.05) 132px 138px
        ),
        var(--cream);
      box-shadow: 10px 10px 0 var(--ink);
    }

    .modal-close {
      position: sticky;
      top: 0;
      margin-left: auto;
      margin-bottom: 10px;
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      border: 4px solid var(--ink);
      border-radius: 50%;
      background: var(--red);
      color: #fff;
      font-size: 22px;
      font-weight: 1000;
      cursor: pointer;
      box-shadow: 4px 4px 0 var(--ink);
      z-index: 3;
    }

    .detail-panel {
      padding: 20px;
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 24px;
      border: 4px solid var(--ink);
      border-radius: 26px;
      background: #fff;
    }

    .detail-media {
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-width: 0;
    }

    .detail-image {
      min-height: 440px;
      overflow: hidden;
      border: 4px solid var(--ink);
      border-radius: 24px;
      background: #f4ead8;
      display: grid;
      place-items: center;
    }

    .detail-image img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
    }

    .modal-nav {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .modal-nav-btn {
      border: 4px solid var(--ink);
      border-radius: 999px;
      background: #fff;
      color: var(--ink);
      padding: 14px 16px;
      font-size: 15px;
      font-weight: 1000;
      cursor: pointer;
      box-shadow: 4px 4px 0 var(--ink);
      transition: 0.18s ease;
    }

    .modal-nav-btn:hover:not(:disabled) {
      background: var(--yellow);
      transform: translate(-2px, -2px);
    }

    .modal-nav-btn:disabled {
      opacity: 0.42;
      cursor: not-allowed;
      box-shadow: none;
    }

    .detail-info {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .detail-top-labels {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .detail-label {
      display: inline-block;
      padding: 7px 14px;
      border: 3px solid var(--ink);
      border-radius: 999px;
      color: #fff;
      font-size: 14px;
      font-weight: 1000;
    }

    .detail-label.group {
      background: var(--red);
    }

    .detail-label.theme {
      background: var(--green);
    }

    .detail-title {
      margin: 0 0 18px;
      font-size: clamp(28px, 4vw, 40px);
      line-height: 1.3;
      font-weight: 1000;
    }

    .detail-list {
      display: grid;
      gap: 11px;
      margin-bottom: 18px;
    }

    .detail-row {
      display: grid;
      grid-template-columns: 112px 1fr;
      gap: 12px;
      align-items: start;
      padding-bottom: 11px;
      border-bottom: 2px dashed var(--soft-line);
      font-size: 16px;
      line-height: 1.75;
    }

    .detail-row strong {
      font-weight: 1000;
    }

    .detail-description {
      padding: 16px;
      margin-bottom: 18px;
      border: 3px solid var(--ink);
      border-radius: 18px;
      background: var(--paper);
      font-size: 16px;
      line-height: 1.9;
      font-weight: 700;
    }

    .detail-vote-box {
      margin-top: auto;
      padding: 16px;
      border: 4px solid var(--ink);
      border-radius: 20px;
      background: #fff5d3;
    }

    .detail-vote-count {
      margin-bottom: 12px;
      font-size: 19px;
      font-weight: 1000;
    }

    .detail-vote-count span {
      display: inline-block;
      margin-left: 6px;
      padding: 5px 12px;
      border: 3px solid var(--ink);
      border-radius: 999px;
      background: var(--red);
      color: #fff;
      font-size: 22px;
    }

    .detail-vote-count span.vote-pulse {
      animation: voteCountPulse 0.75s ease;
    }

    .detail-action-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    /* =========================
       提示訊息
    ========================= */
    .toast {
      position: fixed;
      left: 50%;
      bottom: 112px;
      z-index: 10000;
      transform: translateX(-50%) translateY(20px);
      opacity: 0;
      pointer-events: none;
      padding: 13px 20px;
      border: 4px solid var(--ink);
      border-radius: 999px;
      background: var(--ink);
      color: #fff;
      font-size: 15px;
      font-weight: 1000;
      box-shadow: 5px 5px 0 rgba(0, 0, 0, 0.25);
      transition: 0.25s ease;
      max-width: calc(100% - 32px);
      text-align: center;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* =========================
       平板
    ========================= */
    @media (max-width: 980px) {
      .side-badge {

  <!-- 作品詳細彈窗 -->
  <div class="modal" id="detailModal">

            </button>

        </div>

          <div class="detail-top-labels">

            <div class="detail-label theme" id="modalTheme"></div>
          </div>

            </div>

              <div id="modalPhotoTheme"></div>
            </div>
          </div>

          <div class="detail-description" id="modalDescription"></div>

          <div class="detail-vote-box">
            <div class="detail-vote-count">
              人氣票數
              <span id="modalVotes"></span>
            </div>

              <button class="vote-btn" id="modalVoteBtn">
                ❤ 投這個作品一票
              </button>
            </div>
          </div>
        </div>

    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    /**********************************************
     * 1. Apps Script Web App URL
     **********************************************/
    const API_URL = "https://script.google.com/macros/s/AKfycbyjF8idieIUWms-JI-1sGyQe7tRzPdd5SEagG8fwZG9C-1IWQLY7wi1k6lLmVo8ftp1Xg/exec";


    /**********************************************
     * 2. 設定值與全域狀態
     **********************************************/
    const INITIAL_VISIBLE_COUNT = 9;

    let works = [];
    let currentGroup = "social";
    let currentKeyword = "";
    let currentWorkId = null;
    let visibleCount = INITIAL_VISIBLE_COUNT;
    let currentModalSequence = [];
    let currentModalIndex = -1;

    const votedToday = new Set();
    const pendingVotes = new Set();

    const voterId = getOrCreateVoterId();


    /**********************************************
     * 3. 匿名投票者 ID
     **********************************************/
    function getOrCreateVoterId() {
      const storageKey = "photo_vote_voter_id";
      let id = localStorage.getItem(storageKey);

      if (!id) {
        if (window.crypto && crypto.randomUUID) {
          id = crypto.randomUUID();
        } else {
          id =
            "voter_" +
            Date.now() +
            "_" +
            Math.random().toString(36).slice(2, 12);
        }

        localStorage.setItem(storageKey, id);
      }

      return id;
    }


    /**********************************************
     * 4. 讀取 Google Sheet 作品資料
     **********************************************/
    async function loadWorks() {
      try {
        const url =
          `${API_URL}?action=getWorks` +
          `&voter_id=${encodeURIComponent(voterId)}` +
          `&t=${Date.now()}`;

        const response = await fetch(url);
        const data = await response.json();

        if (!data.ok) {
          throw new Error(data.message || "作品資料載入失敗");
        }

        works = Array.isArray(data.works) ? data.works : [];

        votedToday.clear();
        (data.voted_today || []).forEach(workId => votedToday.add(workId));

        document.getElementById("skeletonGallery").style.display = "none";
        document.getElementById("gallery").style.display = "grid";

        renderGallery();

      } catch (error) {
        const skeleton = document.getElementById("skeletonGallery");

        skeleton.innerHTML = `
          <div class="empty-state">
            <h3>作品載入失敗</h3>
            <p>${escapeHtml(error.message || "請稍後再試")}</p>
          </div>
        `;

        showToast("作品載入失敗，請確認 API 網址與部署設定");
      }
    }


    /**********************************************
     * 5. 篩選、搜尋、固定編號排序
     **********************************************/
    function getFilteredSortedWorks() {
      let result = works.filter(work => work.group_key === currentGroup);

      if (currentKeyword.trim()) {
        const keyword = currentKeyword.trim().toLowerCase();

        result = result.filter(work => {
          const searchableText = [
            work.display_number,
            work.work_name,
            work.participant_name,
            work.shooting_theme
          ].join(" ").toLowerCase();

          return searchableText.includes(keyword);
        });
      }

      result.sort((a, b) =>
        String(a.display_number || "").localeCompare(
          String(b.display_number || ""),
          "zh-Hant",
          { numeric: true }
        )
      );

      return result;
    }


    /**********************************************
     * 6. 渲染卡片
     **********************************************/
    function renderGallery() {
      const gallery = document.getElementById("gallery");
      const resultBar = document.getElementById("resultBar");
      const loadMoreWrap = document.getElementById("loadMoreWrap");
      const loadMoreBtn = document.getElementById("loadMoreBtn");

      const filteredWorks = getFilteredSortedWorks();
      const displayedWorks = filteredWorks.slice(0, visibleCount);

      const groupText = currentGroup === "social" ? "社會組" : "大專組";

      if (currentKeyword.trim()) {
        resultBar.innerHTML =
          `目前顯示 <strong>${groupText}</strong> 中，符合「${escapeHtml(currentKeyword)}」的 ` +
          `<strong>${filteredWorks.length}</strong> 件作品，已展開 ` +
          `<strong>${displayedWorks.length}</strong> 件`;
      } else {
        resultBar.innerHTML =
          `目前顯示 <strong>${groupText}</strong> 共 ` +
          `<strong>${filteredWorks.length}</strong> 件作品，已展開 ` +
          `<strong>${displayedWorks.length}</strong> 件`;
      }

      if (!filteredWorks.length) {
        loadMoreWrap.hidden = true;

        gallery.innerHTML = `
          <div class="empty-state">
            <h3>找不到符合條件的作品</h3>
            <p>請換個關鍵字，或一鍵清除搜尋後重新瀏覽。</p>
            <button class="empty-clear-btn" type="button" onclick="clearSearch()">
              清除搜尋，查看全部作品
            </button>
          </div>
        `;
        return;
      }

      gallery.innerHTML = displayedWorks.map(work => {
        const isVoted = votedToday.has(work.work_id);
        const isLoading = pendingVotes.has(work.work_id);

        return `
          <article class="photo-card" data-work-id="${escapeHtml(work.work_id)}">
            <div class="photo-click-area" onclick="openModal('${escapeJs(work.work_id)}')">
              <div class="photo-wrap">
                <img
                  src="${escapeHtml(work.image_url)}"
                  alt="${escapeHtml(work.work_name)}"
                  loading="lazy"
                  decoding="async"
                >
                <div class="work-number">${escapeHtml(work.display_number)}</div>
                <div class="detail-hint">點我看詳情</div>
              </div>
            </div>

            <div class="card-body">
              <div class="photo-click-area" onclick="openModal('${escapeJs(work.work_id)}')">
                <div class="card-tag">${escapeHtml(work.shooting_theme)}</div>
                <h3 class="card-title">${escapeHtml(work.work_name)}</h3>
                <div class="card-author">參賽者｜${escapeHtml(work.participant_name)}</div>
              </div>

              <div class="card-actions">
                <button
                  class="vote-btn ${isVoted ? "voted" : ""} ${isLoading ? "loading" : ""}"
                  onclick="voteWork('${escapeJs(work.work_id)}')"
                >
                  ${
                    isLoading
                      ? "投票送出中…"
                      : isVoted
                        ? "✓ 今天已投過"
                        : "❤ 投這個作品一票"
                  }
                </button>

                <div class="vote-count">
                  ${Number(work.votes || 0)}
                  <small>票</small>
                </div>
              </div>
            </div>
          </article>
        `;
      }).join("");

      const remaining = filteredWorks.length - displayedWorks.length;

      if (remaining > 0) {
        loadMoreWrap.hidden = false;
        loadMoreBtn.textContent = `查看更多作品（還有 ${remaining} 件）`;
      } else {
        loadMoreWrap.hidden = true;
      }
    }


    /**********************************************
     * 7. 載入更多
     **********************************************/
    document.getElementById("loadMoreBtn").addEventListener("click", function() {
      visibleCount += INITIAL_VISIBLE_COUNT;
      renderGallery();
    });


    /**********************************************
     * 8. 開啟作品詳細彈窗
     **********************************************/
    function openModal(workId) {
      const work = works.find(item => item.work_id === workId);
      if (!work) return;

      currentModalSequence = getFilteredSortedWorks();
      currentModalIndex = currentModalSequence.findIndex(item => item.work_id === workId);

      renderModalByWork(work);
      document.getElementById("detailModal").classList.add("show");
      document.body.classList.add("modal-open");
    }


    function renderModalByWork(work) {
      currentWorkId = work.work_id;

      document.getElementById("modalImage").src = work.image_url;
      document.getElementById("modalImage").alt = work.work_name;
      document.getElementById("modalGroup").textContent = work.group_name;
      document.getElementById("modalTheme").textContent = work.shooting_theme;
      document.getElementById("modalTitle").textContent = work.work_name;
      document.getElementById("modalNumber").textContent = work.display_number;
      document.getElementById("modalWorkName").textContent = work.work_name;
      document.getElementById("modalAuthor").textContent = work.participant_name;
      document.getElementById("modalPhotoTheme").textContent = work.shooting_theme;
      document.getElementById("modalDescription").textContent = work.description;
      document.getElementById("modalVotes").textContent = Number(work.votes || 0);

      updateModalVoteButton(work.work_id);
      updateModalNavigation();
    }


    function closeModal() {
      document.getElementById("detailModal").classList.remove("show");
      document.body.classList.remove("modal-open");
      currentWorkId = null;
      currentModalSequence = [];
      currentModalIndex = -1;
    }


    function updateModalVoteButton(workId) {
      const button = document.getElementById("modalVoteBtn");
      const isVoted = votedToday.has(workId);
      const isLoading = pendingVotes.has(workId);

      button.classList.toggle("voted", isVoted);
      button.classList.toggle("loading", isLoading);

      button.textContent = isLoading
        ? "投票送出中…"
        : isVoted
          ? "✓ 今天已投過"
          : "❤ 投這個作品一票";
    }


    function updateModalNavigation() {
      const prevBtn = document.getElementById("prevWorkBtn");
      const nextBtn = document.getElementById("nextWorkBtn");

      prevBtn.disabled = currentModalIndex <= 0;
      nextBtn.disabled = currentModalIndex >= currentModalSequence.length - 1;
    }


    function showPreviousWork() {
      if (currentModalIndex <= 0) return;

      currentModalIndex -= 1;
      renderModalByWork(currentModalSequence[currentModalIndex]);
    }


    function showNextWork() {
      if (currentModalIndex >= currentModalSequence.length - 1) return;

      currentModalIndex += 1;
      renderModalByWork(currentModalSequence[currentModalIndex]);
    }


    document.getElementById("prevWorkBtn").addEventListener("click", showPreviousWork);
    document.getElementById("nextWorkBtn").addEventListener("click", showNextWork);


    /**********************************************
     * 9. 投票
     **********************************************/
    async function voteWork(workId) {
      if (votedToday.has(workId)) {
        showToast("你今天已經投過這件作品囉！");
        return;
      }

      if (pendingVotes.has(workId)) {
        return;
      }

      pendingVotes.add(workId);
      renderGallery();

      if (currentWorkId === workId) {
        updateModalVoteButton(workId);
      }

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "text/plain;charset=utf-8"
          },
          body: JSON.stringify({
            action: "vote",
            work_id: workId,
            voter_id: voterId
          })
        });

        const data = await response.json();

        if (!data.ok) {
          if (data.code === "DUPLICATE_TODAY") {
            votedToday.add(workId);
            showToast("你今天已經投過這件作品囉！");
          } else {
            throw new Error(data.message || "投票失敗");
          }
        } else {
          votedToday.add(workId);

          const target = works.find(item => item.work_id === workId);
          if (target) {
            target.votes = Number(data.votes || target.votes || 0);
          }

          showToast("投票成功，謝謝你的支持！");
        }

      } catch (error) {
        showToast(error.message || "投票失敗，請稍後再試");
      } finally {
        pendingVotes.delete(workId);
        renderGallery();

        if (currentWorkId === workId) {
          const target = works.find(item => item.work_id === workId);

          if (target) {
            document.getElementById("modalVotes").textContent = Number(target.votes || 0);
          }

          updateModalVoteButton(workId);
        }

        if (votedToday.has(workId)) {
          triggerVoteSuccessAnimation(workId);
        }
      }
    }


    function triggerVoteSuccessAnimation(workId) {
      const card = document.querySelector(`[data-work-id="${cssEscape(workId)}"]`);

      if (card) {
        const count = card.querySelector(".vote-count");
        const button = card.querySelector(".vote-btn");

        if (count) {
          count.classList.add("vote-pulse");
          setTimeout(() => count.classList.remove("vote-pulse"), 800);
        }

        if (button) {
          button.classList.add("vote-success-pop");
          setTimeout(() => button.classList.remove("vote-success-pop"), 600);
        }
      }

      if (currentWorkId === workId) {
        const modalCount = document.getElementById("modalVotes");
        modalCount.classList.add("vote-pulse");
        setTimeout(() => modalCount.classList.remove("vote-pulse"), 800);
      }
    }


    /**********************************************
     * 10. 組別與搜尋事件
     **********************************************/
    function setGroup(group) {
      currentGroup = group;
      currentKeyword = "";
      visibleCount = INITIAL_VISIBLE_COUNT;

      document.getElementById("searchInput").value = "";
      updateSearchClearButton();

      document.querySelectorAll(".group-btn").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.group === group);
      });

      renderGallery();
    }


    document.querySelectorAll(".group-btn").forEach(button => {
      button.addEventListener("click", () => {
        setGroup(button.dataset.group);
      });
    });


    document.getElementById("searchInput").addEventListener("input", function() {
      currentKeyword = this.value;
      visibleCount = INITIAL_VISIBLE_COUNT;
      updateSearchClearButton();
      renderGallery();
    });


    document.getElementById("clearSearchBtn").addEventListener("click", clearSearch);


    function clearSearch() {
      currentKeyword = "";
      visibleCount = INITIAL_VISIBLE_COUNT;
      document.getElementById("searchInput").value = "";
      updateSearchClearButton();
      renderGallery();
      document.getElementById("searchInput").focus();
    }


    function updateSearchClearButton() {
      const button = document.getElementById("clearSearchBtn");
      button.classList.toggle("show", !!currentKeyword.trim());
    }


    /**********************************************
     * 11. Modal 事件
     **********************************************/
    document.getElementById("modalClose").addEventListener("click", closeModal);

    document.getElementById("detailModal").addEventListener("click", function(event) {
      if (event.target === this) {
        closeModal();
      }
    });

    document.getElementById("modalVoteBtn").addEventListener("click", function() {
      if (currentWorkId) {
        voteWork(currentWorkId);
      }
    });

    document.addEventListener("keydown", function(event) {
      const modalIsOpen = document.getElementById("detailModal").classList.contains("show");

      if (!modalIsOpen) return;

      if (event.key === "Escape") {
        closeModal();
      }

      if (event.key === "ArrowLeft") {
        showPreviousWork();
      }

      if (event.key === "ArrowRight") {
        showNextWork();
      }
    });


    /**********************************************
     * 12. 提示訊息
     **********************************************/
    function showToast(message) {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.classList.add("show");

      clearTimeout(window.toastTimer);
      window.toastTimer = setTimeout(() => {
        toast.classList.remove("show");
      }, 2400);
    }


    /**********************************************
     * 13. 基礎字串安全處理
     **********************************************/
    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeJs(value) {
      return String(value ?? "")
        .replaceAll("\\", "\\\\")
        .replaceAll("'", "\\'");
    }

    function cssEscape(value) {
      if (window.CSS && CSS.escape) {
        return CSS.escape(value);
      }

      return String(value).replace(/["\\]/g, "\\$&");
    }


    /**********************************************
     * 14. 啟動
     **********************************************/
    loadWorks();
  </script>
</body>
</html>
